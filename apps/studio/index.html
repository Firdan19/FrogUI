<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐸</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>FrogUI Studio</title>
  </head>
  <body>
    <main class="studio-shell">
      <section class="studio-command-surface">

      <section class="studio-stream-surface">
        <frog-agent-stream gateway-url="http://localhost:3001"></frog-agent-stream>
        <frog-memory-view></frog-memory-view>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
