services:
  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/api-gateway.Dockerfile
    container_name: frogui-api-gateway
    ports:
      - "${GATEWAY_PORT:-3001}:3001"
    environment:
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=3001
      - AGENT_CLI_COMMAND=${AGENT_CLI_COMMAND:-./scripts/run_agent.sh}
      - DATABASE_URL=${DATABASE_URL:-postgres://frogui:frogui_dev_password@postgres:5432/frogui}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      - postgres
      - redis

  studio:
    build:
      context: .
      dockerfile: infra/docker/studio.Dockerfile
    container_name: frogui-studio
    ports:
      - "${STUDIO_PORT:-5173}:5173"
    environment:
      - VITE_GATEWAY_URL=http://localhost:${GATEWAY_PORT:-3001}
    depends_on:
      - api-gateway

  postgres:
    image: pgvector/pgvector:pg16
    container_name: frogui-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-frogui}
      - POSTGRES_USER=${POSTGRES_USER:-frogui}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-frogui_dev_password}
    volumes:
      - frogui_postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: frogui-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./database/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - frogui_redis_data:/data

volumes:
  frogui_postgres_data:
  frogui_redis_data:
